name: Scientific Validation & CI (Atuação Constante)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código Source
      uses: actions/checkout@v4

    - name: Configurar Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Instalar Dependências do Sistema
      run: |
        python -m pip install --upgrade pip
        pip install -r python/requirements.txt

    - name: Teste 1 - Verificação de Compilação e Sintaxe
      run: |
        python -m py_compile python/orange_core.py python/orange_api.py python/orange_app.py python/galaxy_models.py

    - name: Teste 2 - Execução de Simulação e Ablação Core
      run: |
        cd python && python orange_core.py

    - name: Teste 3 - Validação de Órbitas e Ajustes SPARC
      run: |
        cd python && python galaxy_models.py
